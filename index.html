function addDays(dateStr, n) {

function resolveClaimStatus(claim) {
  if (["approved","submitted","needs_revision","in_progress","waitlisted"].includes(claim.status)) return claim.status;
  if (claim.status === "claimed" && claim.expiresAt) {
    const days = daysUntil(claim.expiresAt);
    if (days <= 0) return "expired";
    if (days <= 3) return "expiring_soon";
  }
  return claim.status;
}

function StatusBadge({ status }) {
  const m = STATUS_META[status] || STATUS_META.available;
  return (
    <span className={`status-badge ${m.bg} ${m.text}`}>
      <span className={`inline-block w-1.5 h-1.5 rounded-full ${m.dot}`} />
      {m.label}
    </span>
  );
}

function ExpiryPill({ expiresAt, status }) {
  if (!expiresAt || !["claimed","expiring_soon"].includes(status)) return null;
  const days = daysUntil(expiresAt);
  if (days <= 0) return <span className="text-xs text-slate-400">Expired</span>;
  const urgent = days <= 3;
  return (
    <span className={`text-xs font-medium ${urgent ? "text-orange-600" : "text-slate-400"}`}>
      {urgent ? "⏰ " : "⏱ "}{days}d left
    </span>
  );
}

function SelectInput({ label, value, onChange, options, placeholder, required }) {

        {placeholder && <option value="">{placeholder}</option>}
        {options.map(o => typeof o === "string"
          ? <option key={o} value={o}>{o}</option>
          : <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows=3 }) {
  return (
    <div>
      {label && <label className="block text-xs font-medium text-slate-500 mb-1">{label}</label>}
      <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}

    </div>

function Btn({ children, onClick, variant="primary", size="md", disabled, className="" }) {
  const base = "inline-flex items-center gap-1.5 font-medium rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer";
  const sizes = { sm:"text-xs px-3 py-1.5", md:"text-sm px-4 py-2", lg:"text-sm px-5 py-2.5" };
  const variants = {
    primary:  "bg-sky-500 hover:bg-sky-600 text-white focus:ring-sky-400",
    secondary:"bg-slate-100 hover:bg-slate-200 text-slate-700 focus:ring-slate-300",
    success:  "bg-teal-500 hover:bg-teal-600 text-white focus:ring-teal-400",
    danger:   "bg-rose-500 hover:bg-rose-600 text-white focus:ring-rose-400",
    warning:  "bg-amber-400 hover:bg-amber-500 text-white focus:ring-amber-300",
    ghost:    "hover:bg-slate-100 text-slate-600 focus:ring-slate-300 px-2",
    outline:  "border border-slate-200 hover:bg-slate-50 text-slate-700 focus:ring-slate-300",
  };
  return (
    <button onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
      {children}
    </button>
  );
}

function Avatar({ name, size="md" }) {
  const colors = ["from-sky-400 to-violet-400","from-teal-400 to-emerald-400","from-orange-400 to-rose-400","from-violet-400 to-fuchsia-400","from-amber-400 to-orange-400","from-sky-400 to-teal-400"];
  const idx = name.charCodeAt(0) % colors.length;
  const sz = size==="sm" ? "w-7 h-7 text-xs" : size==="lg" ? "w-10 h-10 text-base" : "w-8 h-8 text-sm";
  return (
    <div className={`${sz} rounded-full bg-gradient-to-br ${colors[idx]} flex items-center justify-center text-white font-bold flex-shrink-0`}>
      {name[0]}
    </div>
  );
}

// ─── COMMENT THREAD ──────────────────────────────────────────────────────────

function CommentThread({ comments, onAddComment, currentName, currentRole }) {
  const [text, setText] = useState("");
  function submit() {
    if (!text.trim()) return;
    onAddComment({ id:"cm"+uid(), author:currentName, role:currentRole, text:text.trim(), date:today() });
    setText("");
  }
  return (
    <div className="space-y-3">
      <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Comments ({comments.length})</p>
      {comments.length === 0 && <p className="text-xs text-slate-400 py-2">No comments yet.</p>}
      <div className="space-y-2 max-h-48 overflow-y-auto scrollbar-thin">
        {comments.map(c=>(
          <div key={c.id} className={`flex gap-2.5 ${c.role==="admin"?"flex-row-reverse":""}`}>
            <Avatar name={c.author} size="sm" />
            <div className={`flex-1 rounded-xl px-3 py-2 text-xs ${c.role==="admin"?"bg-slate-100 text-slate-700":"bg-sky-50 text-slate-700"}`}>
              <div className="flex items-center gap-1.5 mb-0.5">
                <span className="font-semibold">{c.author}</span>
                <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${c.role==="admin"?"bg-slate-200 text-slate-600":"bg-sky-100 text-sky-600"}`}>
                  {c.role==="admin"?"Admin":"Pro"}
                </span>
                <span className="text-slate-400 ml-auto">{c.date}</span>
              </div>
              <p className="leading-relaxed">{c.text}</p>
            </div>
          </div>
        ))}
      </div>
      <div className="flex gap-2 pt-1">
        <input value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}}}
          placeholder="Add a comment…"
          className="flex-1 border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-sky-400" />
        <Btn size="sm" onClick={submit} disabled={!text.trim()}>Send</Btn>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [view, setView]         = useState("landing");
  const [activePro, setActivePro] = useState(null);
  const [pros, setPros]         = useState(PROS_SEED);

  function loginPro(p) {
    setActivePro(p);
    setView("pro");
  }
  function updatePro(updated) {
    setPros(prev=>prev.map(p=>p.id===updated.id?updated:p));
    setActivePro(updated);
  }

  if (view==="landing") return <Landing onAdmin={()=>setView("admin")} onPro={loginPro} pros={pros} />;
  if (view==="admin")   return <AdminApp onBack={()=>setView("landing")} />;
  if (view==="pro" && activePro && !activePro.profileComplete)
    return <ProOnboarding pro={activePro} onSave={updatePro} onBack={()=>setView("landing")} />;
  if (view==="pro")     return <ProApp pro={activePro} onBack={()=>setView("landing")} onUpdatePro={updatePro} />;
}

// ─── ADMIN APP ────────────────────────────────────────────────────────────────

function AdminApp({ onBack }) {
  const [guides, setGuides] = useState(GUIDES_SEED);
  const [claims, setClaims] = useState(CLAIMS_SEED);
  const [pros]              = useState(PROS_SEED);
  const [tab, setTab]       = useState("guides");
  const [filterCat, setFilterCat]       = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [filterCity, setFilterCity]     = useState("");
  const [filterProId, setFilterProId]   = useState("");
  const [search, setSearch]             = useState("");
  const [modal, setModal]               = useState(null);

  const cities = useMemo(()=>[...new Set(claims.map(c=>c.city))].sort(),[claims]);

  const enrichedClaims = useMemo(()=>claims.map(c=>({
    ...c,
    resolvedStatus: resolveClaimStatus(c),
    guide: guides.find(g=>g.id===c.guideId),
    pro:   pros.find(p=>p.id===c.proId),
  })),[claims,guides,pros]);

  const filteredGuides = useMemo(()=>guides.filter(g=>{
    if (filterCat && g.category!==filterCat) return false;
    if (search && !g.title.toLowerCase().includes(search.toLowerCase()) && !g.keyword.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[guides,filterCat,search]);

  const filteredClaims = useMemo(()=>enrichedClaims.filter(c=>{
    if (filterStatus && c.resolvedStatus!==filterStatus) return false;
    if (filterCity   && c.city!==filterCity) return false;
    if (filterProId  && c.proId!==filterProId) return false;
    if (search && c.guide && !c.guide.title.toLowerCase().includes(search.toLowerCase()) &&
        c.pro && !c.pro.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[enrichedClaims,filterStatus,filterCity,filterProId,search]);

  function updateClaim(claimId, patch) {
    setClaims(prev=>prev.map(c=>c.id===claimId ? {...c,...patch} : c));
    setModal(null);
  }

  function addComment(claimId, comment) {
    setClaims(prev=>prev.map(c=>c.id===claimId ? {...c, comments:[...c.comments,comment]} : c));
  }

  function addGuide(g) { setGuides(prev=>[...prev,{...g,id:"g"+uid()}]); setTab("guides"); }

  function deleteGuide(id) {
    if (!confirm("Delete this guide? All claims will also be removed.")) return;
    setGuides(prev=>prev.filter(g=>g.id!==id));
    setClaims(prev=>prev.filter(c=>c.guideId!==id));
  }

  function exportCSV() {
    const rows=[["Claim ID","Guide","Category","City","State","Pro","Email","Status","Claimed","Expires","Submitted Doc","Comments"],
      ...filteredClaims.map(c=>[c.id,c.guide?.title||"",c.guide?.category||"",c.city,c.state,c.pro?.name||"",c.pro?.email||"",
        c.resolvedStatus,c.claimedAt,c.expiresAt||"",c.submittedDocUrl||"",c.comments.map(x=>x.author+": "+x.text).join(" | ")])];
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="claims-export.csv"; a.click();
  }

  const stats = useMemo(()=>{
    const rs = enrichedClaims.map(c=>c.resolvedStatus);
    return {
      total:    guides.length,
      claimed:  rs.filter(s=>s==="claimed"||s==="expiring_soon").length,
      inProg:   rs.filter(s=>s==="in_progress").length,
      submitted:rs.filter(s=>s==="submitted").length,
      approved: rs.filter(s=>s==="approved").length,
      revision: rs.filter(s=>s==="needs_revision").length,
      waitlist: rs.filter(s=>s==="waitlisted").length,
      expired:  rs.filter(s=>s==="expired").length,
    };
  },[guides,enrichedClaims]);

  const TABS = [{id:"guides",label:"Guides"},{id:"claims",label:"Claims"},{id:"add",label:"+ Add Guide"}];

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-40">
        <button onClick={onBack} className="text-slate-400 hover:text-slate-700 text-sm flex items-center gap-1.5">← Back</button>
        <div className="h-5 w-px bg-slate-200" />
        <span className="font-semibold text-slate-800">Admin Dashboard</span>
        <div className="ml-auto">
          <Btn variant="outline" size="sm" onClick={exportCSV}>⬇ Export CSV</Btn>
        </div>
      </header>

      <div className="max-w-7xl mx-auto p-6 space-y-5">
        {/* Stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-2">
          {[
            {label:"Guides",    val:stats.total,     color:"text-slate-700", bg:"bg-white"},
            {label:"Claimed",   val:stats.claimed,   color:"text-sky-600",   bg:"bg-sky-50"},
            {label:"In Progress",val:stats.inProg,   color:"text-violet-600",bg:"bg-violet-50"},
            {label:"Submitted", val:stats.submitted, color:"text-amber-600", bg:"bg-amber-50"},
            {label:"Approved",  val:stats.approved,  color:"text-teal-600",  bg:"bg-teal-50"},
            {label:"Revision",  val:stats.revision,  color:"text-rose-600",  bg:"bg-rose-50"},
            {label:"Waitlisted",val:stats.waitlist,  color:"text-slate-600", bg:"bg-slate-100"},
            {label:"Expired",   val:stats.expired,   color:"text-slate-400", bg:"bg-white border border-slate-100"},
          ].map(s=>(
            <div key={s.label} className={`${s.bg} rounded-xl p-3 border border-slate-100`}>
              <p className={`text-xl font-bold ${s.color}`}>{s.val}</p>
              <p className="text-xs text-slate-500 mt-0.5">{s.label}</p>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div className="flex gap-1 bg-slate-100 p-1 rounded-xl w-fit">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t.id?"bg-white shadow text-slate-800":"text-slate-500 hover:text-slate-700"}`}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Search */}
        {tab!=="add" && (
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={tab==="guides"?"Search by title or keyword…":"Search by guide or pro name…"}
            className="w-full max-w-sm border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        )}

        {/* GUIDES TAB */}
        {tab==="guides" && (
          <div className="space-y-3">
            <div className="flex gap-3">
              <SelectInput value={filterCat} onChange={setFilterCat} options={CATEGORIES} placeholder="All categories" />
            </div>
            <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-slate-50 border-b border-slate-100">
                  <tr>{["Title","Category","Keyword","Cities Claimed","Actions"].map(h=>(
                    <th key={h} className="text-left text-xs font-semibold text-slate-500 uppercase tracking-wide px-4 py-3">{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {filteredGuides.map(g=>{
                    const activeClaims = claims.filter(c=>c.guideId===g.id && !["expired","waitlisted"].includes(resolveClaimStatus(c)));
                    return (
                      <tr key={g.id} className="hover:bg-slate-50/70 transition-colors">
                        <td className="px-4 py-3 max-w-xs">
                          <p className="font-medium text-slate-800 truncate">{g.title}</p>
                          <p className="text-xs text-slate-400 truncate mt-0.5">{g.metaDesc}</p>
                        </td>
                        <td className="px-4 py-3"><span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">{g.category}</span></td>
                        <td className="px-4 py-3 text-slate-500 text-xs max-w-xs truncate">{g.keyword}</td>
                        <td className="px-4 py-3">
                          <span className="font-semibold text-slate-700">{activeClaims.length}</span>
                          <span className="text-slate-400 text-xs ml-1">cities</span>
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex gap-1">
                            <Btn size="sm" variant="ghost" onClick={()=>setModal({type:"viewGuide",data:g})}>View</Btn>
                            <Btn size="sm" variant="ghost" onClick={()=>setModal({type:"editGuide",data:g})}>Edit</Btn>
                            <Btn size="sm" variant="ghost" onClick={()=>deleteGuide(g.id)}>🗑</Btn>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {filteredGuides.length===0 && <p className="text-center text-slate-400 py-10">No guides match.</p>}
            </div>
          </div>
        )}

        {/* CLAIMS TAB */}
        {tab==="claims" && (
          <div className="space-y-3">
            <div className="flex gap-2 flex-wrap">
              <SelectInput value={filterStatus} onChange={setFilterStatus} options={Object.keys(STATUS_META)} placeholder="All statuses" />
              <SelectInput value={filterCity}   onChange={setFilterCity}   options={cities}                   placeholder="All cities" />
              <SelectInput value={filterProId}  onChange={setFilterProId}  options={pros.map(p=>({value:p.id,label:p.name}))} placeholder="All pros" />
            </div>
            <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-slate-50 border-b border-slate-100">
                  <tr>{["Guide","Pro","City","Status","Expiry","Submitted Doc","Comments","Actions"].map(h=>(
                    <th key={h} className="text-left text-xs font-semibold text-slate-500 uppercase tracking-wide px-4 py-3">{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {filteredClaims.map(c=>(
                    <tr key={c.id} className="hover:bg-slate-50/70 transition-colors">
                      <td className="px-4 py-3 max-w-[180px]">
                        <p className="font-medium text-slate-800 text-xs truncate">{c.guide?.title}</p>
                        <p className="text-xs text-slate-400">{c.guide?.category}</p>
                      </td>
                      <td className="px-4 py-3">
                        <p className="font-medium text-slate-700 text-xs">{c.pro?.name}</p>
                        <p className="text-xs text-slate-400 truncate max-w-[120px]">{c.pro?.businessName}</p>
                      </td>
                      <td className="px-4 py-3 text-xs text-slate-600 whitespace-nowrap">{c.city}, {c.state}</td>
                      <td className="px-4 py-3 whitespace-nowrap"><StatusBadge status={c.resolvedStatus} /></td>
                      <td className="px-4 py-3 whitespace-nowrap">
                        <ExpiryPill expiresAt={c.expiresAt} status={c.resolvedStatus} />
                      </td>
                      <td className="px-4 py-3">
                        {c.submittedDocUrl
                          ? <a href={c.submittedDocUrl} target="_blank" rel="noreferrer" className="text-sky-500 hover:underline text-xs">Open ↗</a>
                          : <span className="text-slate-300 text-xs">—</span>}
                      </td>
                      <td className="px-4 py-3">
                        <span className="text-xs text-slate-500">{c.comments.length} note{c.comments.length!==1?"s":""}</span>
                      </td>
                      <td className="px-4 py-3">
                        <Btn size="sm" variant="ghost" onClick={()=>setModal({type:"reviewClaim",data:c})}>Review</Btn>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {filteredClaims.length===0 && <p className="text-center text-slate-400 py-10">No claims match.</p>}
            </div>
          </div>
        )}

        {/* ADD */}
        {tab==="add" && <AddGuideForm onAdd={addGuide} />}
      </div>

      {/* MODALS */}
      {modal?.type==="viewGuide" && (
        <Modal title="Guide Details" onClose={()=>setModal(null)} wide>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2"><Field label="Title" value={modal.data.title} /></div>
            <Field label="Category" value={modal.data.category} />
            <Field label="Keyword" value={modal.data.keyword} />
            <div className="col-span-2"><Field label="Meta Description" value={modal.data.metaDesc} /></div>
            <div className="col-span-2">
              <p className="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Content Outline</p>
              <ul className="space-y-1">
                {(CONTENT_OUTLINES[modal.data.category]||[]).map((item,i)=>(
                  <li key={i} className="flex items-center gap-2 text-sm text-slate-600">
                    <span className="w-5 h-5 rounded-full bg-slate-100 text-slate-500 text-xs flex items-center justify-center font-medium flex-shrink-0">{i+1}</span>
                    {item}
                  </li>
                ))}
              </ul>
            </div>
            <div className="col-span-2"><Field label="Google Doc" value={modal.data.docUrl} mono /></div>
            {modal.data.notes && <div className="col-span-2"><Field label="Notes for Pro" value={modal.data.notes} /></div>}
          </div>
          <div className="mt-5 pt-4 border-t border-slate-100"><Btn variant="secondary" onClick={()=>setModal(null)}>Close</Btn></div>
        </Modal>
      )}

      {modal?.type==="editGuide" && (
        <EditGuideModal guide={modal.data} onSave={(updated)=>{setGuides(prev=>prev.map(g=>g.id===updated.id?updated:g));setModal(null);}} onClose={()=>setModal(null)} />
      )}

      {modal?.type==="reviewClaim" && (
        <ReviewClaimModal
          claim={modal.data}
          onUpdateStatus={(id,status)=>updateClaim(id,{status})}
          onAddComment={(id,comment)=>{addComment(id,comment);}}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

function ReviewClaimModal({ claim, onUpdateStatus, onAddComment, onClose }) {
  const [localComments, setLocalComments] = useState(claim.comments||[]);

  function handleComment(c) {
    setLocalComments(prev=>[...prev,c]);
    onAddComment(claim.id, c);
  }

  return (
    <Modal title="Review Claim" onClose={onClose} extraWide>
      <div className="grid grid-cols-2 gap-5">
        {/* Left: details */}
        <div className="space-y-3">
          <Field label="Guide" value={claim.guide?.title} />
          <div className="grid grid-cols-2 gap-3">
            <Field label="Category" value={claim.guide?.category} />
            <Field label="City" value={`${claim.city}, ${claim.state}`} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Pro" value={claim.pro?.name} />
            <Field label="Email" value={claim.pro?.email} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Status" value={<StatusBadge status={claim.resolvedStatus} />} />
            <Field label="Claimed" value={claim.claimedAt} />
          </div>
          {claim.expiresAt && <Field label="Expires" value={<span>{claim.expiresAt} <ExpiryPill expiresAt={claim.expiresAt} status={claim.resolvedStatus} /></span>} />}
          {claim.submittedDocUrl && (
            <div>
              <p className="text-xs font-medium text-slate-400 uppercase tracking-wide mb-1">Submitted Doc</p>
              <a href={claim.submittedDocUrl} target="_blank" rel="noreferrer" className="text-sky-500 hover:underline text-sm break-all">{claim.submittedDocUrl}</a>
            </div>
          )}
          <div className="pt-4 border-t border-slate-100">
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Change Status</p>
            <div className="flex flex-wrap gap-2">
              <Btn variant="success"   size="sm" onClick={()=>onUpdateStatus(claim.id,"approved")}>✓ Approve</Btn>
              <Btn variant="warning"   size="sm" onClick={()=>onUpdateStatus(claim.id,"needs_revision")}>↩ Request Revision</Btn>
              <Btn variant="danger"    size="sm" onClick={()=>onUpdateStatus(claim.id,"claimed")}>✗ Reject Submission</Btn>
              <Btn variant="secondary" size="sm" onClick={onClose}>Cancel</Btn>
            </div>
          </div>
        </div>
        {/* Right: comments */}
        <div className="border-l border-slate-100 pl-5">
          <CommentThread comments={localComments} onAddComment={handleComment} currentName="Admin" currentRole="admin" />
        </div>
      </div>
    </Modal>
  );
}

function ProApp({ pro, onBack, onUpdatePro }) {
  const [guides]            = useState(GUIDES_SEED);
  const [claims, setClaims]  = useState(CLAIMS_SEED);
  const [tab, setTab]        = useState("library");
  const [filterCat, setFilterCat] = useState("");
  const [search, setSearch]       = useState("");
  const [modal, setModal]         = useState(null);
  const [showProfile, setShowProfile] = useState(false);

  const myClaims = useMemo(()=>claims.filter(c=>c.proId===pro.id).map(c=>({
    ...c, resolvedStatus:resolveClaimStatus(c), guide:guides.find(g=>g.id===c.guideId)
  })),[claims,guides,pro]);

  function claimGuide(guideId, city, state) {
    const active = claims.find(c=>c.guideId===guideId && c.city===city &&
      ["claimed","expiring_soon","in_progress","submitted","approved"].includes(resolveClaimStatus(c)));
    if (active) return {error:`${city} is already claimed for this guide.`, canWaitlist:true};
    const newClaim = { id:"c"+uid(), guideId, proId:pro.id, city, state,
      status:"claimed", claimedAt:today(), expiresAt:addDays(today(),CLAIM_EXPIRY_DAYS),
      submittedDocUrl:"", comments:[] };
    setClaims(prev=>[...prev,newClaim]);
    return {error:null};
  }

  function joinWaitlist(guideId, city, state) {
    const existing = claims.find(c=>c.guideId===guideId && c.proId===pro.id && c.city===city);
    if (existing) return;
    setClaims(prev=>[...prev,{id:"c"+uid(),guideId,proId:pro.id,city,state,
      status:"waitlisted",claimedAt:today(),expiresAt:null,submittedDocUrl:"",comments:[]}]);
  }

  function startEditing(claimId) {
    setClaims(prev=>prev.map(c=>c.id===claimId?{...c,status:"in_progress"}:c));
  }

  function submitDoc(claimId, docUrl) {
    setClaims(prev=>prev.map(c=>c.id===claimId?{...c,status:"submitted",submittedDocUrl:docUrl}:c));
    setModal(null);
  }

  function addComment(claimId, comment) {
    setClaims(prev=>prev.map(c=>c.id===claimId?{...c,comments:[...c.comments,comment]}:c));
  }

  const filteredGuides = useMemo(()=>guides.filter(g=>{
    if (filterCat && g.category!==filterCat) return false;
    if (search && !g.title.toLowerCase().includes(search.toLowerCase()) &&
        !g.category.toLowerCase().includes(search.toLowerCase()) &&
        !g.keyword.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[guides,filterCat,search]);

  function getMyClaimForGuide(guideId) {
    return claims.find(c=>c.guideId===guideId && c.proId===pro.id);
  }

  function guideDisplayStatus(guideId) {
    const mine = getMyClaimForGuide(guideId);
    if (mine) return resolveClaimStatus(mine);
    return "available";
  }

  const TABS = [{id:"library",label:"Guide Library"},{id:"my",label:`My Guides (${myClaims.length})`}];

  const statsData = [
    {label:"Claimed",    val:myClaims.filter(c=>["claimed","expiring_soon"].includes(c.resolvedStatus)).length, color:"text-sky-600",   bg:"bg-sky-50"},
    {label:"In Progress",val:myClaims.filter(c=>c.resolvedStatus==="in_progress").length,                      color:"text-violet-600",bg:"bg-violet-50"},
    {label:"Submitted",  val:myClaims.filter(c=>c.resolvedStatus==="submitted").length,                        color:"text-amber-600", bg:"bg-amber-50"},
    {label:"Approved",   val:myClaims.filter(c=>c.resolvedStatus==="approved").length,                         color:"text-teal-600",  bg:"bg-teal-50"},
  ];

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-40">
        <button onClick={onBack} className="text-slate-400 hover:text-slate-700 text-sm flex items-center gap-1.5">← Back</button>
        <div className="h-5 w-px bg-slate-200" />
        <Avatar name={pro.name} />
        <div>
          <p className="font-semibold text-slate-800 text-sm">{pro.name}</p>
          <p className="text-xs text-slate-400">{pro.businessName} · {pro.city}, {pro.state}</p>
        </div>
        <div className="ml-auto">
          <Btn variant="ghost" size="sm" onClick={()=>setShowProfile(true)}>Edit Profile</Btn>
        </div>
      </header>

      <div className="max-w-6xl mx-auto p-6 space-y-5">
        {/* Stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {statsData.map(s=>(
            <div key={s.label} className={`${s.bg} rounded-xl p-4 border border-slate-100`}>
              <p className={`text-2xl font-bold ${s.color}`}>{s.val}</p>
              <p className="text-xs text-slate-500 mt-0.5">{s.label}</p>
            </div>
          ))}
        </div>

        {/* Needs-revision alert */}
        {myClaims.some(c=>c.resolvedStatus==="needs_revision") && (
          <div className="bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-rose-500 text-lg">⚠️</span>
            <div>
              <p className="text-sm font-semibold text-rose-700">Revision requested</p>
              <p className="text-xs text-rose-600">
                {myClaims.filter(c=>c.resolvedStatus==="needs_revision").length} guide{myClaims.filter(c=>c.resolvedStatus==="needs_revision").length>1?"s":""} need{myClaims.filter(c=>c.resolvedStatus==="needs_revision").length===1?"s":""} your attention.
                <button className="underline ml-1" onClick={()=>setTab("my")}>View My Guides →</button>
              </p>
            </div>
          </div>
        )}

        {/* Expiring-soon alert */}
        {myClaims.some(c=>c.resolvedStatus==="expiring_soon") && (
          <div className="bg-orange-50 border border-orange-200 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-orange-500 text-lg">⏰</span>
            <div>
              <p className="text-sm font-semibold text-orange-700">Claims expiring soon</p>
              <p className="text-xs text-orange-600">Start editing to keep your claim active.
                <button className="underline ml-1" onClick={()=>setTab("my")}>View My Guides →</button>
              </p>
            </div>
          </div>
        )}

        {/* Tabs */}
        <div className="flex gap-1 bg-slate-100 p-1 rounded-xl w-fit">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t.id?"bg-white shadow text-slate-800":"text-slate-500 hover:text-slate-700"}`}>
              {t.label}
            </button>
          ))}
        </div>

        {/* LIBRARY */}
        {tab==="library" && (
          <div className="space-y-4">
            <div className="flex gap-3 flex-wrap">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search guides…"
                className="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 w-60" />
              <SelectInput value={filterCat} onChange={setFilterCat} options={CATEGORIES} placeholder="All categories" />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              {filteredGuides.map(g=>{
                const status     = guideDisplayStatus(g.id);
                const myClaim    = getMyClaimForGuide(g.id);
                const takenCities= claims.filter(c=>c.guideId===g.id &&
                  ["claimed","expiring_soon","in_progress","submitted","approved"].includes(resolveClaimStatus(c))).map(c=>c.city);
                const waitlisted = claims.filter(c=>c.guideId===g.id && c.status==="waitlisted");
                return (
                  <div key={g.id} className="bg-white rounded-2xl border border-slate-100 hover:shadow-sm transition-all flex flex-col">
                    <div className="p-5 flex-1">
                      <div className="flex items-start justify-between gap-2 mb-2.5">
                        <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">{g.category}</span>
                        <StatusBadge status={status} />
                      </div>
                      <h3 className="font-semibold text-slate-800 text-sm leading-snug mb-2">{g.title}</h3>
                      <p className="text-xs text-slate-500 leading-relaxed line-clamp-3">{g.metaDesc}</p>
                      {takenCities.length > 0 && (
                        <div className="mt-3 flex flex-wrap gap-1">
                          {takenCities.slice(0,3).map(c=><span key={c} className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{c}</span>)}
                          {takenCities.length>3 && <span className="text-xs text-slate-400">+{takenCities.length-3}</span>}
                        </div>
                      )}
                      {waitlisted.length>0 && (
                        <p className="text-xs text-slate-400 mt-1.5">{waitlisted.length} on waitlist</p>
                      )}
                    </div>
                    <div className="px-5 pb-4 pt-0 flex gap-2 flex-wrap">
                      {/* Preview always available */}
                      <Btn size="sm" variant="ghost" onClick={()=>setModal({type:"preview",data:g})}>Preview</Btn>
                      {!myClaim && <Btn size="sm" onClick={()=>setModal({type:"claim",data:g})}>Claim</Btn>}
                      {myClaim && (
                        <>
                          {(myClaim.status==="claimed"||resolveClaimStatus(myClaim)==="expiring_soon") && (
                            <Btn size="sm" variant="secondary" onClick={()=>{startEditing(myClaim.id);setTab("my");}}>Start Editing</Btn>
                          )}
                          {resolveClaimStatus(myClaim)==="in_progress" && (
                            <Btn size="sm" onClick={()=>setModal({type:"submit",data:{...myClaim,guide:g}})}>Submit</Btn>
                          )}
                          {resolveClaimStatus(myClaim)==="needs_revision" && (
                            <Btn size="sm" variant="warning" onClick={()=>setModal({type:"submit",data:{...myClaim,guide:g}})}>Resubmit</Btn>
                          )}
                          {myClaim.status==="waitlisted" && (
                            <span className="text-xs text-slate-400 self-center">On waitlist for {myClaim.city}</span>
                          )}
                        </>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            {filteredGuides.length===0 && <p className="text-center text-slate-400 py-10">No guides match your search.</p>}
          </div>
        )}

        {/* MY GUIDES */}
        {tab==="my" && (
          <div className="space-y-3">
            {myClaims.length===0 && (
              <div className="text-center py-16 bg-white rounded-2xl border border-slate-100">
                <p className="text-slate-400 text-sm">You haven't claimed any guides yet.</p>
                <div className="mt-3"><Btn size="sm" onClick={()=>setTab("library")}>Browse Library</Btn></div>
              </div>
            )}
            {myClaims.map(c=>(
              <div key={c.id} className="bg-white rounded-2xl border border-slate-100 p-5 space-y-4">
                <div className="flex flex-col sm:flex-row sm:items-start gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">{c.guide?.category}</span>
                      <span className="text-xs text-slate-400">{c.city}, {c.state}</span>
                      <ExpiryPill expiresAt={c.expiresAt} status={c.resolvedStatus} />
                    </div>
                    <p className="font-semibold text-slate-800 text-sm">{c.guide?.title}</p>
                    <p className="text-xs text-slate-400 mt-0.5">Claimed {c.claimedAt}</p>
                  </div>
                  <div className="flex items-center gap-3 flex-shrink-0">
                    <StatusBadge status={c.resolvedStatus} />
                    <div className="flex gap-2 flex-wrap">
                      {c.guide && (
                        <a href={c.guide.docUrl} target="_blank" rel="noreferrer">
                          <Btn size="sm" variant="ghost">Template ↗</Btn>
                        </a>
                      )}
                      {(c.resolvedStatus==="claimed"||c.resolvedStatus==="expiring_soon") &&
                        <Btn size="sm" variant="secondary" onClick={()=>startEditing(c.id)}>Start Editing</Btn>}
                      {(c.resolvedStatus==="in_progress"||c.resolvedStatus==="needs_revision") &&
                        <Btn size="sm" variant={c.resolvedStatus==="needs_revision"?"warning":"primary"}
                          onClick={()=>setModal({type:"submit",data:c})}>
                          {c.resolvedStatus==="needs_revision"?"Resubmit":"Submit"}
                        </Btn>}
                      {c.submittedDocUrl &&
                        <a href={c.submittedDocUrl} target="_blank" rel="noreferrer">
                          <Btn size="sm" variant="ghost">My Doc ↗</Btn>
                        </a>}
                    </div>
                  </div>
                </div>
                {/* Comment thread */}
                {c.comments.length > 0 && (
                  <div className="border-t border-slate-100 pt-4">
                    <CommentThread
                      comments={c.comments}
                      onAddComment={(comment)=>addComment(c.id, comment)}
                      currentName={pro.name}
                      currentRole="pro"
                    />
                  </div>
                )}
                {c.comments.length === 0 && (c.resolvedStatus==="needs_revision"||c.resolvedStatus==="in_progress") && (
                  <div className="border-t border-slate-100 pt-4">
                    <CommentThread
                      comments={[]}
                      onAddComment={(comment)=>addComment(c.id, comment)}
                      currentName={pro.name}
                      currentRole="pro"
                    />
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* MODALS */}
      {modal?.type==="preview" && (
        <GuidePreviewModal
          guide={modal.data}
          onClaim={()=>setModal({type:"claim",data:modal.data})}
          onClose={()=>setModal(null)}
          alreadyClaimed={!!getMyClaimForGuide(modal.data.id)}
        />
      )}

      {modal?.type==="claim" && (
        <ClaimModal
          guide={modal.data}
          pro={pro}
          existingClaims={claims}
          onClaim={(city,state)=>{
            const result = claimGuide(modal.data.id, city, state);
            if (result.error) return result;
            setModal(null); setTab("my");
            return result;
          }}
          onWaitlist={(city,state)=>{joinWaitlist(modal.data.id,city,state);setModal(null);}}
          onClose={()=>setModal(null)}
        />
      )}

      {modal?.type==="submit" && (
        <SubmitModal claim={modal.data} onSubmit={(url)=>submitDoc(modal.data.id,url)} onClose={()=>setModal(null)} />
      )}

      {showProfile && (
        <EditProfileModal pro={pro} onSave={(updated)=>{onUpdatePro(updated);setShowProfile(false);}} onClose={()=>setShowProfile(false)} />
      )}
    </div>
  );
}

// ─── GUIDE PREVIEW MODAL ─────────────────────────────────────────────────────

function GuidePreviewModal({ guide, onClaim, onClose, alreadyClaimed }) {
  const outline = CONTENT_OUTLINES[guide.category] || [];
  return (
    <Modal title="Guide Preview" onClose={onClose} wide>
      <div className="space-y-5">
        <div>
          <div className="flex items-center gap-2 mb-2">
            <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">{guide.category}</span>
            <span className="text-xs text-slate-400">Keyword: {guide.keyword}</span>
          </div>
          <h3 className="text-lg font-bold text-slate-800">{guide.title}</h3>
          <p className="text-sm text-slate-500 mt-2 leading-relaxed">{guide.metaDesc}</p>
        </div>

        <div>
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Content Outline</p>
          <div className="space-y-2">
            {outline.map((item,i)=>(
              <div key={i} className="flex items-center gap-3 p-2.5 rounded-lg bg-slate-50">
                <span className="w-6 h-6 rounded-full bg-sky-100 text-sky-600 text-xs flex items-center justify-center font-semibold flex-shrink-0">{i+1}</span>
                <span className="text-sm text-slate-700">{item}</span>
              </div>
            ))}
          </div>
        </div>

        {guide.notes && (
          <div className="bg-sky-50 border border-sky-100 rounded-xl px-4 py-3">
            <p className="text-xs font-semibold text-sky-700 mb-1">📌 Note from Admin</p>
            <p className="text-sm text-sky-700">{guide.notes}</p>
          </div>
        )}

        <div className="bg-amber-50 border border-amber-100 rounded-xl px-4 py-3">
          <p className="text-xs font-semibold text-amber-700 mb-1">⏱ Claim Window</p>
          <p className="text-xs text-amber-700">You'll have <strong>{CLAIM_EXPIRY_DAYS} days</strong> after claiming to start editing. Once you mark it "In Progress," the timer stops.</p>
        </div>
      </div>

      <div className="mt-6 pt-4 border-t border-slate-100 flex gap-3">
        {!alreadyClaimed && <Btn onClick={onClaim}>Claim This Guide</Btn>}
        <Btn variant="secondary" onClick={onClose}>Close</Btn>
      </div>
    </Modal>
  );
}

// ─── CLAIM MODAL ─────────────────────────────────────────────────────────────

function ClaimModal({ guide, pro, existingClaims, onClaim, onWaitlist, onClose }) {
  const [city, setCity]   = useState(pro.city);
  const [state, setState] = useState(pro.state);
  const [error, setError] = useState(null);
  const [showWaitlist, setShowWaitlist] = useState(false);

  const takenCities = existingClaims.filter(c=>c.guideId===guide.id &&
    ["claimed","expiring_soon","in_progress","submitted","approved"].includes(resolveClaimStatus(c))).map(c=>c.city);
  const isTaken = city && takenCities.includes(city);

  function handleClaim() {
    const result = onClaim(city, state);
    if (result?.error) { setError(result.error); setShowWaitlist(result.canWaitlist); }
  }

  return (
    <Modal title="Claim Guide" onClose={onClose}>
      <div className="space-y-4">
        <div className="bg-slate-50 rounded-xl p-4">
          <p className="font-medium text-slate-800 text-sm">{guide.title}</p>
          <p className="text-xs text-slate-400 mt-1">{guide.category} · {guide.keyword}</p>
        </div>

        <div className="bg-sky-50 border border-sky-100 rounded-xl px-4 py-3 text-xs text-sky-700">
          <strong>How it works:</strong> Claim this guide for your city, localize it, and submit your revised Google Doc. You have {CLAIM_EXPIRY_DAYS} days to start editing before the claim expires.
        </div>

        <p className="text-sm text-slate-600">Which city are you localizing this guide for?</p>
        <div className="grid grid-cols-2 gap-3">
          <Input label="City" value={city} onChange={v=>{setCity(v);setError(null);setShowWaitlist(false);}} placeholder="e.g. Austin" required />
          <SelectInput label="State" value={state} onChange={setState} options={US_STATES} placeholder="State" required />
        </div>

        {isTaken && !error && (
          <div className="bg-rose-50 border border-rose-100 rounded-lg px-3 py-2 text-xs text-rose-700">
            ⚠ {city} is already claimed. You can join the waitlist and get notified if it opens up.
          </div>
        )}

        {error && (
          <div className="bg-rose-50 border border-rose-100 rounded-lg px-3 py-2 text-xs text-rose-700">
            {error}
          </div>
        )}

        {takenCities.length>0 && (
          <p className="text-xs text-slate-400">Already claimed in: {takenCities.join(", ")}</p>
        )}

        {guide.notes && (
          <div className="bg-sky-50 border border-sky-100 rounded-lg px-3 py-2 text-xs text-sky-700">
            <strong>Admin note:</strong> {guide.notes}
          </div>
        )}
      </div>

      <div className="mt-5 pt-4 border-t border-slate-100 flex gap-3 flex-wrap">
        {!isTaken && !showWaitlist && (
          <Btn onClick={handleClaim} disabled={!city||!state}>Claim for {city||"…"}</Btn>
        )}
        {(isTaken || showWaitlist) && (
          <Btn variant="secondary" onClick={()=>onWaitlist(city,state)} disabled={!city||!state}>
            Join Waitlist for {city||"…"}
          </Btn>
        )}
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
      </div>
    </Modal>
  );
}

// ─── SUBMIT MODAL ─────────────────────────────────────────────────────────────

function SubmitModal({ claim, onSubmit, onClose }) {
  const [url, setUrl] = useState(claim.submittedDocUrl||"");
  return (
    <Modal title="Submit Revised Guide" onClose={onClose}>
      <div className="space-y-4">
        <div className="bg-slate-50 rounded-xl p-4">
          <p className="font-medium text-slate-800 text-sm">{claim.guide?.title}</p>
          <p className="text-xs text-slate-400 mt-1">{claim.city}, {claim.state}</p>
        </div>
        {claim.comments?.filter(c=>c.role==="admin").length > 0 && (
          <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 space-y-2">
            <p className="text-xs font-semibold text-amber-700">Admin feedback</p>
            {claim.comments.filter(c=>c.role==="admin").map(c=>(
              <p key={c.id} className="text-xs text-amber-700">"{c.text}"</p>
            ))}
          </div>
        )}
        <p className="text-sm text-slate-600">Paste the link to your localized Google Doc. Set sharing to "Anyone with link can view."</p>
        <Input label="Your Google Doc URL" value={url} onChange={setUrl} placeholder="https://docs.google.com/document/d/…" required />
      </div>
      <div className="mt-5 pt-4 border-t border-slate-100 flex gap-3">
        <Btn onClick={()=>onSubmit(url)} disabled={!url}>Submit for Review</Btn>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
      </div>
    </Modal>
  );
}

// ─── EDIT PROFILE MODAL ───────────────────────────────────────────────────────

function EditProfileModal({ pro, onSave, onClose }) {
  const [f,setF] = useState({...pro});
  const set = k => v => setF(p=>({...p,[k]:v}));
  return (
    <Modal title="Edit Profile" onClose={onClose} wide>
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-4">
          <Input label="Name" value={f.name} onChange={set("name")} />
          <Input label="Business Name" value={f.businessName} onChange={set("businessName")} />
        </div>
        <SelectInput label="Category" value={f.category} onChange={set("category")} options={CATEGORIES} />
        <div className="grid grid-cols-2 gap-4">
          <Input label="City" value={f.city} onChange={set("city")} />
          <SelectInput label="State" value={f.state} onChange={set("state")} options={US_STATES} />
        </div>
        <Input label="Email" value={f.email} onChange={set("email")} type="email" />
        <Input label="Website / Thumbtack URL" value={f.website} onChange={set("website")} />
      </div>
      <div className="mt-5 pt-4 border-t border-slate-100 flex gap-3">
        <Btn onClick={()=>onSave(f)}>Save Changes</Btn>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
      </div>
    </Modal>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
